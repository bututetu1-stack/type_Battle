name: Deploy to GitHub Pages

on:
  push:
    branches:
      # 公開ブランチ。main へマージ後にデプロイされる。
      - main
  # 手動実行も可能にしておく
  workflow_dispatch:

# gh-pages ブランチへ push するため contents: write を付与。
permissions:
  contents: write

# 同時デプロイは1つに制限（進行中のものは中断しない）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Firebase 設定はリポジトリ Secrets から注入
          # (Settings → Secrets and variables → Actions → New repository secret)
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      # dist を gh-pages ブランチへ公開（Settings → Pages → Source を
      # 「Deploy from a branch: gh-pages / (root)」に設定して使う）。
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          # Jekyll 処理を無効化（_ で始まるアセット等をそのまま配信）
          enable_jekyll: false
